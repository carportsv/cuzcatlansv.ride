name: Deploy to GitHub Pages with Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Replace secrets in config.js
      run: |
        echo "🔐 Reemplazando placeholders en config.js..."
        # Reemplazar placeholders con secrets en config.js (compatible con Linux)
        sed -i 's|{{FIREBASE_API_KEY}}|${{ secrets.FIREBASE_API_KEY }}|g' js/config.js
        sed -i 's|{{FIREBASE_AUTH_DOMAIN}}|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' js/config.js
        sed -i 's|{{FIREBASE_PROJECT_ID}}|${{ secrets.FIREBASE_PROJECT_ID }}|g' js/config.js
        sed -i 's|{{FIREBASE_STORAGE_BUCKET}}|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' js/config.js
        sed -i 's|{{FIREBASE_MESSAGING_SENDER_ID}}|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' js/config.js
        sed -i 's|{{FIREBASE_APP_ID}}|${{ secrets.FIREBASE_APP_ID }}|g' js/config.js
        sed -i 's|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g' js/config.js
        sed -i 's|{{SUPABASE_ANON_KEY}}|${{ secrets.SUPABASE_ANON_KEY }}|g' js/config.js
        echo "✅ Placeholders reemplazados en config.js"
        
    - name: Replace secrets in index.html
      run: |
        echo "🔐 Reemplazando placeholders en index.html..."
        # Reemplazar placeholders con secrets en index.html (compatible con Linux)
        sed -i 's|{{FIREBASE_API_KEY}}|${{ secrets.FIREBASE_API_KEY }}|g' index.html
        sed -i 's|{{FIREBASE_AUTH_DOMAIN}}|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' index.html
        sed -i 's|{{FIREBASE_PROJECT_ID}}|${{ secrets.FIREBASE_PROJECT_ID }}|g' index.html
        sed -i 's|{{FIREBASE_STORAGE_BUCKET}}|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' index.html
        sed -i 's|{{FIREBASE_MESSAGING_SENDER_ID}}|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' index.html
        sed -i 's|{{FIREBASE_APP_ID}}|${{ secrets.FIREBASE_APP_ID }}|g' index.html
        sed -i 's|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g' index.html
        sed -i 's|{{SUPABASE_ANON_KEY}}|${{ secrets.SUPABASE_ANON_KEY }}|g' index.html
        echo "✅ Placeholders reemplazados en index.html"
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_branch: gh-pages
